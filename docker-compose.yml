services:
  db:
    image: mariadb:10.11
    container_name: ${PROJECT_NAME}-db
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
    restart: always

  wordpress:
    image: dunglas/frankenphp:latest
    container_name: ${PROJECT_NAME}-app
    depends_on:
      - db
    ports:
      - "8080:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./html:/var/www/html
      - ./init-wp.sh:/usr/local/bin/init-wp.sh
    environment:
      SERVER_NAME: localhost
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD}@db/wordpress
    entrypoint: ["sh", "-c", "init-wp.sh && frankenphp run --config /etc/caddy/Caddyfile"]

  pma:
    image: phpmyadmin:latest
    container_name: ${PROJECT_NAME}-pma
    environment:
      PMA_HOST: db 
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "8086:80"
    depends_on:
      - db

volumes:
  db_data: {}
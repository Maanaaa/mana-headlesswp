services:
  db:
    image: mariadb:10.11
    container_name: ${PROJECT_NAME}-db
    restart: always
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress:
    build:
      context: .
      dockerfile_inline: |
        FROM dunglas/frankenphp:latest
        RUN apt-get update && apt-get install -y git tar curl mariadb-client
        RUN install-php-extensions mysqli
        RUN curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar \
            && chmod +x wp-cli.phar \
            && mv wp-cli.phar /usr/local/bin/wp
    container_name: ${PROJECT_NAME}-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./html:/var/www/html
      - ./init-wp.sh:/usr/local/bin/init-wp.sh
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      PHP_OPTIONS: "-d memory_limit=512M"
    entrypoint: ["sh", "-c", "/usr/local/bin/init-wp.sh && frankenphp run --config /etc/caddy/Caddyfile"]

  pma:
    image: phpmyadmin:latest
    container_name: ${PROJECT_NAME}-pma
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
      PMA_ABSOLUTE_URI: https://${PROJECT_NAME}.dev.theo-manya.fr/pma/
    ports:
      - "${PMA_PORT}:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: {}